name: CI — Lint · Security · Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check src/ app/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ app/ tests/

  # ──────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit[toml] safety pip-audit

      - name: SAST — bandit
        run: |
          bandit -r src/ app/ \
            -c pyproject.toml \
            --severity-level medium \
            --format json \
            -o bandit-report.json || true
          bandit -r src/ app/ -c pyproject.toml --severity-level medium

      - name: CVE scan — safety
        run: safety check -r requirements.txt --json || true

      - name: CVE scan — pip-audit
        run: pip-audit -r requirements.txt --format json || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install lightweight subset — no torch/ultralytics for unit tests
          pip install \
            numpy pandas pillow pyyaml tqdm \
            pytest pytest-cov pytest-timeout \
            mlflow

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --timeout=120 \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [lint, security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Streamlit serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.serve
          push: false
          tags: anti-uav-app:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────
  ci-passed:
    name: All CI checks passed
    runs-on: ubuntu-latest
    needs: [lint, security, test, docker-build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}"         != "success" ]] || \
             [[ "${{ needs.test.result }}"         != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All CI checks passed ✅"
