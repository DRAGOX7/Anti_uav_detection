name: CD — Build · Push · Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "notebooks/**"
      - "reports/**"

env:
  REGISTRY:    ghcr.io
  IMAGE_NAME:  ${{ github.repository }}/anti-uav-app
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  pull-best-model:
    name: Pull best model from MLflow Registry
    runs-on: ubuntu-latest
    outputs:
      model-version: ${{ steps.get-model.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install MLflow
        run: pip install mlflow

      - name: Pull Production model from MLflow Registry
        id: get-model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python - <<'EOF'
          import mlflow
          import os

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI", "")
          if not tracking_uri:
              print("No MLFLOW_TRACKING_URI set — skipping model pull.")
              print("::set-output name=version::local")
              exit(0)

          mlflow.set_tracking_uri(tracking_uri)
          client = mlflow.MlflowClient()

          model_name = "anti-uav-yolov11s"
          try:
              versions = client.get_latest_versions(model_name, stages=["Production"])
              if versions:
                  v = versions[0]
                  print(f"Found Production model: {model_name} v{v.version}")
                  # Download weights
                  local_path = mlflow.artifacts.download_artifacts(
                      artifact_uri=f"models:/{model_name}/{v.version}",
                      dst_path="app/model_weights",
                  )
                  print(f"Downloaded to: {local_path}")
                  print(f"::set-output name=version::{v.version}")
              else:
                  print("No Production model found — using bundled weights.")
                  print("::set-output name=version::local")
          except Exception as e:
              print(f"MLflow unavailable: {e}. Using bundled weights.")
              print("::set-output name=version::local")
          EOF

  # ──────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [pull-best-model]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.serve
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            MODEL_VERSION=${{ needs.pull-best-model.outputs.model-version }}

  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hugging Face Spaces (or Cloud Run)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Option A: Deploy to Hugging Face Spaces ──────────────────────
      # Uncomment this block to push to HF Spaces
      # - name: Push to HF Space
      #   env:
      #     HF_TOKEN: ${{ secrets.HF_TOKEN }}
      #     HF_SPACE: your-username/anti-uav-detection
      #   run: |
      #     pip install huggingface_hub
      #     python -c "
      #     from huggingface_hub import HfApi
      #     api = HfApi()
      #     api.upload_folder(
      #         folder_path='.',
      #         repo_id='${{ env.HF_SPACE }}',
      #         repo_type='space',
      #         token='${{ env.HF_TOKEN }}',
      #         ignore_patterns=['data/**', 'runs/**', '.git/**'],
      #     )
      #     "

      # ── Option B: Deploy to Cloud Run ────────────────────────────────
      # Uncomment for GCP Cloud Run
      # - name: Authenticate GCP
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}
      # - name: Deploy to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v2
      #   with:
      #     service: anti-uav-app
      #     image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      #     region: us-central1
      #     flags: --port 8501 --memory 4Gi --cpu 2

      # ── Default: log the deployment info ─────────────────────────────
      - name: Deployment summary
        run: |
          echo "=================================================="
          echo "  Deployment Summary"
          echo "=================================================="
          echo "  Image:   ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "  SHA:     ${{ github.sha }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo ""
          echo "  To run locally:"
          echo "  docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "  docker run -p 8501:8501 ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "=================================================="

      - name: Health check (if endpoint configured)
        if: ${{ vars.APP_URL != '' }}
        run: |
          echo "Waiting 30s for deployment to stabilise..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.APP_URL }}/healthz" || echo "000")
          if [[ "$STATUS" != "200" ]]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed ✅  (${{ vars.APP_URL }})"
