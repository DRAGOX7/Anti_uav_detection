name: CD — Build · Push · Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "notebooks/**"
      - "reports/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/anti-uav-app
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1: Pull the model and save it as an artifact
  # ──────────────────────────────────────────────────────────────────────
  pull-best-model:
    name: Pull best model from MLflow Registry
    runs-on: ubuntu-latest
    outputs:
      model-version: ${{ steps.get-model.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install MLflow
        run: pip install mlflow

      - name: Pull Production model from MLflow Registry
        id: get-model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python - <<'EOF'
          import mlflow
          import os

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI", "")
          if not tracking_uri:
              print("No MLFLOW_TRACKING_URI set — skipping model pull.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("version=local\n")
              exit(0)

          mlflow.set_tracking_uri(tracking_uri)
          client = mlflow.MlflowClient()

          model_name = "anti-uav-yolov11s"
          try:
              versions = client.get_latest_versions(model_name, stages=["Production"])
              if versions:
                  v = versions[0]
                  print(f"Found Production model: {model_name} v{v.version}")
                  local_path = mlflow.artifacts.download_artifacts(
                      artifact_uri=f"models:/{model_name}/{v.version}",
                      dst_path="app/model_weights",
                  )
                  print(f"Downloaded to: {local_path}")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"version={v.version}\n")
              else:
                  print("No Production model found — using bundled weights.")
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write("version=local\n")
          except Exception as e:
              print(f"MLflow unavailable: {e}. Using bundled weights.")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("version=local\n")
          EOF

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: app/model_weights/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2: Build image (Downloads weights to include them in Docker COPY)
  # ──────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [pull-best-model]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: app/model_weights/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            MODEL_VERSION=${{ needs.pull-best-model.outputs.model-version }}

  # ──────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy (Downloads weights so huggingface_hub includes them)
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [build-and-push, pull-best-model]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: app/model_weights/

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: Dragox2005/anti-uav-detection
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='.',
              repo_id='${{ env.HF_SPACE }}',
              repo_type='space',
              token='${{ env.HF_TOKEN }}',
              allow_patterns=['app/model_weights/*.pt'],
              ignore_patterns=['data/**', 'runs/**', '.git/**'],
          )
          "

      - name: Deployment summary
        run: |
          echo "=================================================="
          echo "  Deployment Summary"
          echo "=================================================="
          echo "  Image:   ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "  Model:   ${{ needs.pull-best-model.outputs.model-version }}"
          echo "=================================================="

      - name: Health check (if endpoint configured)
        if: ${{ vars.APP_URL != '' }}
        run: |
          echo "Waiting 30s for deployment to stabilise..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.APP_URL }}/healthz" || echo "000")
          if [[ "$STATUS" != "200" ]]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed ✅  (${{ vars.APP_URL }})"
